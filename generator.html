<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pass Generator - Perfect Alignment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 480px; width: 100%; }
        h2 { color: #0b3c5d; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0b3c5d; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #canvasContainer { margin-top: 20px; text-align: center; max-width: 100%; }
        canvas { max-width: 100%; height: auto; border: 2px solid #0b3c5d; border-radius: 8px; display: none; }
        .download-btn { background: #27ae60; width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>KBC Parchi Generator</h2>
    <div class="form-group"><label>Winner Full Name:</label><input type="text" id="winnerName"></div>
    <div class="form-group"><label>Registration Number:</label><input type="text" id="regNo"></div>
    <div class="form-group"><label>Winner Phone Number:</label><input type="text" id="phoneNo"></div>
    <div class="form-group"><label>Bank Account Number:</label><input type="text" id="accountNo"></div>
    <div class="form-group"><label>Processing Charges:</label><input type="text" id="charges" placeholder="e.g. 12,200"></div>
    <div class="form-group"><label>App Link (QR):</label><input type="text" id="appLink" value="https://kbc-lottery.vercel.app/"></div>
    <div class="form-group"><label>Client Photo:</label><input type="file" id="clientPhoto" accept="image/*"></div>
    <button onclick="generateCertificate()">Generate Parchi</button>
</div>

<div id="canvasContainer">
    <canvas id="certificateCanvas"></canvas>
    <button class="download-btn" id="dlBtn" onclick="downloadCertificate()">Download Parchi</button>
</div>

<script>
    function generateCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');
        const baseImg = new Image();
        baseImg.src = 'certificate_template.png';
        
        baseImg.onload = function() {
            // Standard Fixed Canvas Size
            canvas.width = 1200;
            canvas.height = 700;
            
            ctx.drawImage(baseImg, 0, 0, 1200, 700);
            
            // Text Styles
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 26px Arial";
            
            const name = document.getElementById('winnerName').value;
            const regNo = document.getElementById('regNo').value;
            const phone = document.getElementById('phoneNo').value;
            const account = document.getElementById('accountNo').value;
            const charges = document.getElementById('charges').value;
            const appLink = document.getElementById('appLink').value;
            
            // Fixed aligned coordinates mapping
            ctx.fillText(name, 520, 245);
            ctx.fillText(regNo, 520, 310);
            ctx.fillText(phone, 520, 375);
            ctx.fillText(account, 520, 440);
            
            if(charges) {
                ctx.font = "bold 28px Arial";
                ctx.fillText("Rs. " + charges + "/-", 520, 540);
                
                // Right side breakout text
                ctx.fillStyle = "#ffcc00";
                ctx.font = "bold 22px Arial";
                ctx.fillText("Rs. " + charges + "/-", 1000, 450);
                ctx.fillText("Rs. " + charges + "/-", 1000, 495);
            }
            
            // Process Image
            const photoInput = document.getElementById('clientPhoto');
            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        ctx.drawImage(img, 85, 215, 230, 290); // Fits perfectly in standard box
                        drawQR(ctx, appLink, canvas);
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                drawQR(ctx, appLink, canvas);
            }
        };
    }
    
    function drawQR(ctx, link, canvas) {
        if(link) {
            const qr = new QRious({ value: link, size: 130, level: 'H' });
            const qrImg = new Image();
            qrImg.onload = function() {
                ctx.drawImage(qrImg, 720, 510, 130, 130); // Centered bottom alignment
                showOutput();
            };
            qrImg.src = qr.toDataURL();
        } else {
            showOutput();
        }
    }
    
    function showOutput() {
        document.getElementById('certificateCanvas').style.display = "block";
        document.getElementById('dlBtn').style.display = "block";
    }

    function downloadCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const link = document.createElement('a');
        link.download = 'KBC_Clearance_Pass.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
