<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pass Generator - Ultimate Clean Canvas</title>
    <!-- Qrious Library for QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        h2 {
            color: #0c2340;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0c2340;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #canvasContainer {
            text-align: center;
            max-width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 3px solid #b8860b;
            border-radius: 8px;
            display: none;
        }
        .download-btn {
            background-color: #27ae60;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            display: none;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KBC Parchi Generator</h2>
    
    <div class="form-group">
        <label>Winner Full Name:</label>
        <input type="text" id="winnerName" placeholder="Enter Full Name" value="Imran khan">
    </div>
    
    <div class="form-group">
        <label>Registration Number:</label>
        <input type="text" id="regNo" placeholder="Enter Registration Number" value="Kbc-3698">
    </div>
    
    <div class="form-group">
        <label>Winner Phone Number:</label>
        <input type="text" id="phoneNo" placeholder="Enter Phone Number" value="7867876787">
    </div>
    
    <div class="form-group">
        <label>Bank Account Number:</label>
        <input type="text" id="accountNo" placeholder="Enter Bank Account Number" value="4674764555656545">
    </div>
    
    <div class="form-group">
        <label>Required Ledger Processing Charges:</label>
        <input type="text" id="charges" placeholder="e.g. 12,200" value="12,200">
    </div>

    <div class="form-group">
        <label>App Link (For QR Code):</label>
        <input type="text" id="appLink" value="https://kbc-lottery.vercel.app/">
    </div>

    <div class="form-group">
        <label>Client Passport Photo:</label>
        <input type="file" id="clientPhoto" accept="image/*">
    </div>
    
    <button onclick="generateCertificate()">Generate Parchi</button>
</div>

<div id="canvasContainer">
    <canvas id="certificateCanvas"></canvas>
    <button class="download-btn" id="dlBtn" onclick="downloadCertificate()">Download Parchi</button>
</div>

<script>
    // 1. Clean & Sharp Official Logo (Just KBC with Golden Rings)
    function drawCleanKBCLogo(ctx, x, y) {
        ctx.save();
        
        // Premium Thick Gold Ring
        let goldGrad = ctx.createLinearGradient(x-40, y-40, x+40, y+40);
        goldGrad.addColorStop(0, '#9a6b00');
        goldGrad.addColorStop(0.5, '#e6ca65');
        goldGrad.addColorStop(1, '#b8860b');
        
        ctx.strokeStyle = goldGrad;
        ctx.lineWidth = 4.5;
        ctx.beginPath();
        ctx.arc(x, y, 44, 0, Math.PI * 2);
        ctx.stroke();
        
        // Deep Navy Disc Background
        ctx.fillStyle = "#03142c";
        ctx.beginPath();
        ctx.arc(x, y, 42, 0, Math.PI * 2);
        ctx.fill();
        
        // Thin Inner Accent Ring
        ctx.strokeStyle = "rgba(230, 202, 101, 0.5)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x, y, 36, 0, Math.PI * 2);
        ctx.stroke();

        // Just "KBC" bold text - Center Aligned perfectly
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 26px 'Arial Black', Gadget, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
        ctx.shadowBlur = 3;
        ctx.fillText("KBC", x, y);
        
        ctx.restore();
    }

    // 2. Vector SBI Icon Builder
    function drawSBILogo(ctx, x, y) {
        ctx.save();
        ctx.fillStyle = "#00a4e4";
        ctx.beginPath();
        ctx.arc(x, y, 16, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "#04142c"; 
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = "#04142c";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x, y + 4);
        ctx.lineTo(x, y + 17);
        ctx.stroke();
        ctx.restore();
    }

    function generateCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1200;
        canvas.height = 700;
        
        // Dark Rich Wallpaper Gradient Blue Base
        let bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bgGrad.addColorStop(0, '#041226');
        bgGrad.addColorStop(0.5, '#091f3d');
        bgGrad.addColorStop(1, '#05162e');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Outer Framing Luxury Borders
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 6;
        ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "#f3e5ab";
        ctx.strokeRect(24, 24, canvas.width - 48, canvas.height - 48);
        
        // Render New Clean KBC Corner Logos
        drawCleanKBCLogo(ctx, 95, 95);
        drawCleanKBCLogo(ctx, 1105, 95);
        
        // Document Headings Text Strings
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 52px 'Times New Roman', serif";
        ctx.textAlign = "center";
        ctx.fillText("KBC MEGA LOTTERY", canvas.width / 2, 90);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 23px Arial, sans-serif";
        ctx.fillText("OFFICIAL WINNER CLEARANCE PASS", canvas.width / 2, 135);
        
        ctx.fillStyle = "#d4af37";
        ctx.font = "italic bold 17px Arial, sans-serif";
        ctx.fillText("CERTIFICATE OF JACKPOT CLEARANCE & REGISTRATION", canvas.width / 2, 170);
        
        ctx.textAlign = "left";
        
        // Form Entry Labels System
        const labels = [
            "Winner Full Name:",
            "Registration Number:",
            "Winner Phone Number:",
            "Bank Account Number:",
            "Prize Won:",
            "Required Ledger Processing Charges:"
        ];
        
        let startY = 240;
        let lineSpacing = 55;
        
        labels.forEach((label, index) => {
            ctx.fillStyle = "#d4af37";
            ctx.font = "bold 19px Arial, sans-serif";
            ctx.fillText(label, 320, startY + (index * lineSpacing));
            
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(320, startY + (index * lineSpacing) + 12);
            ctx.lineTo(830, startY + (index * lineSpacing) + 12);
            ctx.stroke();
        });
        
        // Extract Form values live
        ctx.fillStyle = "#ffffff"; 
        ctx.font = "bold 20px Arial, sans-serif";
        
        const name = document.getElementById('winnerName').value || "---";
        const regNo = document.getElementById('regNo').value || "---";
        const phone = document.getElementById('phoneNo').value || "---";
        const account = document.getElementById('accountNo').value || "---";
        const charges = document.getElementById('charges').value || "0.00";
        const appLink = document.getElementById('appLink').value;
        
        // Text alignment precisely onto underlines
        ctx.fillText(name, 510, 240);
        ctx.fillText(regNo, 530, 295);
        ctx.fillText(phone, 545, 350);
        ctx.fillText(account, 540, 405);
        ctx.fillText("₹25,00,000/- (Rupees Twenty-Five Lakhs Only)", 440, 460);
        ctx.fillText("Rs. " + charges + "/-", 700, 515);

        // Sidebar 1 Block - Bank Panel Box
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 2.5;
        ctx.strokeRect(860, 220, 305, 150);
        ctx.fillStyle = "rgba(4, 20, 44, 0.8)";
        ctx.fillRect(860, 220, 305, 150);
        
        drawSBILogo(ctx, 895, 255);
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 17px Arial, sans-serif";
        ctx.fillText("State Bank of India", 922, 260);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "15px Arial, sans-serif";
        ctx.fillText("Transfer Path: Official Secure Wire", 880, 295);
        ctx.fillText("Status: Verification Cleared", 880, 322);
        ctx.fillText("Code Auth: KBC-786-SBI", 880, 348);

        // Sidebar 2 Block - Cost Panel Breakdown
        ctx.strokeRect(860, 395, 305, 145);
        ctx.fillStyle = "rgba(4, 20, 44, 0.8)";
        ctx.fillRect(860, 395, 305, 145);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 17px Arial, sans-serif";
        ctx.fillText("Processing Charges Breakdown", 878, 425);
        ctx.fillStyle = "#ffffff";
        ctx.font = "15px Arial, sans-serif";
        ctx.fillText("Govt Ledger Fee: Rs. " + charges + "/-", 878, 465);
        ctx.fillText("Clearance Tax Cost: Rs. " + charges + "/-", 878, 500);

        // Footer lines baseline setup
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(340, 620); ctx.lineTo(560, 620);
        ctx.moveTo(850, 620); ctx.lineTo(1070, 620);
        ctx.stroke();
        
        // DYNAMIC NATURAL HAND-WRITTEN SIGNATURE GENERATOR (PEN EMULATION)
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        
        // --- LEFT SIDE: Govt Officer Signature (Sharp, Scribbled Ballpoint Look) ---
        ctx.strokeStyle = "#1751d6"; // Sharp royal blue pen ink
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        // Step 1: Initial Scribble "G.Cl"
        ctx.moveTo(345, 595);
        ctx.lineTo(355, 580); ctx.lineTo(360, 600); // G loop
        ctx.moveTo(370, 585); ctx.lineTo(375, 600); // l stroke
        // Step 2: Sudden dynamic sharp dragging lines across the base
        ctx.moveTo(350, 595);
        ctx.lineTo(420, 580);
        ctx.lineTo(390, 605);
        ctx.lineTo(535, 575); // Fast exit stroke
        // Step 3: Two quick slash marks & dots underneath the main body
        ctx.moveTo(395, 612); ctx.lineTo(460, 608);
        ctx.moveTo(410, 616); ctx.lineTo(475, 612);
        ctx.stroke();
        
        // --- RIGHT SIDE: KBC Executive Signature (Elegant, Loop & Wave Ink Pen Style) ---
        ctx.strokeStyle = "#008b8b"; // Dark Teal Ink shade
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        // Step 1: Large stylistic Loop "K" Structure
        ctx.moveTo(865, 595);
        ctx.quadraticCurveTo(855, 550, 880, 555); // Top flourish loop
        ctx.quadraticCurveTo(895, 565, 875, 610); // Downward stem stroke
        // Step 2: Fluid connected cursive waves body structure
        ctx.moveTo(880, 585);
        ctx.bezierCurveTo(905, 565, 915, 615, 940, 580);
        ctx.bezierCurveTo(955, 560, 975, 605, 1000, 570);
        ctx.bezierCurveTo(1015, 555, 1035, 610, 1060, 585); // Exit swoop
        // Step 3: Long sharp cutting line running backwards right to left
        ctx.moveTo(1050, 595);
        ctx.quadraticCurveTo(950, 618, 890, 602);
        ctx.stroke();
        
        ctx.restore();
        
        // Labels alignment under the signatures zone
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = "13px Arial, sans-serif";
        ctx.fillText("Government Clearance Officer Signature", 345, 642);
        ctx.fillText("Authorized KBC Authority Signature", 865, 642);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fillText("KBC CENTRAL CORPORATE TOWER, MUMBAI Hub", 830, 665);

        // Passport Frame Render Box
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(50, 220, 220, 260); 
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 3;
        ctx.strokeRect(50, 220, 220, 260);
        
        const photoInput = document.getElementById('clientPhoto');
        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const clientImg = new Image();
                clientImg.onload = function() {
                    ctx.drawImage(clientImg, 55, 225, 210, 250);
                    drawQRCode(ctx, appLink, canvas);
                }
                clientImg.src = event.target.result;
            }
            reader.readAsDataURL(photoInput.files[0]);
        } else {
            ctx.fillStyle = "#0c2340";
            ctx.font = "bold 14px Arial, sans-serif";
            ctx.fillText("CUSTOMER PIC PLACEHOLDER", 62, 345);
            drawQRCode(ctx, appLink, canvas);
        }
    }
    
    function drawQRCode(ctx, text, canvas) {
        if(text) {
            const qrObj = new QRious({
                value: text,
                size: 110,
                level: 'H'
            });
            
            const qrImg = new Image();
            qrImg.onload = function() {
                ctx.drawImage(qrImg, 70, 540, 110, 110);
                finalizeOutput(canvas);
            };
            qrImg.src = qrObj.toDataURL();
        } else {
            finalizeOutput(canvas);
        }
    }
    
    function finalizeOutput(canvas) {
        canvas.style.display = "block";
        document.getElementById('dlBtn').style.display = "block";
        canvas.scrollIntoView({ behavior: 'smooth' });
    }
    
    function downloadCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        const nameInput = document.getElementById('winnerName').value || "Winner";
        link.download = `KBC_Premium_Clearance_Pass_${nameInput.replace(/\s+/g, '_')}.png`;
        link.href = image;
        link.click();
    }
</script>

</body>
</html>
