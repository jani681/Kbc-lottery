<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pass Generator - Premium Canvas Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        h2 {
            color: #0c2340;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0c2340;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #canvasContainer {
            text-align: center;
            max-width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 3px solid #b8860b;
            border-radius: 8px;
            display: none;
        }
        .download-btn {
            background-color: #27ae60;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            display: none;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KBC Parchi Generator</h2>
    
    <div class="form-group">
        <label>Winner Full Name:</label>
        <input type="text" id="winnerName" placeholder="Enter Full Name">
    </div>
    
    <div class="form-group">
        <label>Registration Number:</label>
        <input type="text" id="regNo" placeholder="Enter Registration Number">
    </div>
    
    <div class="form-group">
        <label>Winner Phone Number:</label>
        <input type="text" id="phoneNo" placeholder="Enter Phone Number">
    </div>
    
    <div class="form-group">
        <label>Bank Account Number:</label>
        <input type="text" id="accountNo" placeholder="Enter Bank Account Number">
    </div>
    
    <div class="form-group">
        <label>Required Ledger Processing Charges:</label>
        <input type="text" id="charges" placeholder="e.g. 12,200">
    </div>

    <div class="form-group">
        <label>App Link (For QR Code):</label>
        <input type="text" id="appLink" value="https://kbc-lottery.vercel.app/">
    </div>

    <div class="form-group">
        <label>Client Passport Photo:</label>
        <input type="file" id="clientPhoto" accept="image/*">
    </div>
    
    <button onclick="generateCertificate()">Generate Parchi</button>
</div>

<div id="canvasContainer">
    <canvas id="certificateCanvas"></canvas>
    <button class="download-btn" id="dlBtn" onclick="downloadCertificate()">Download Parchi</button>
</div>

<script>
    // Helper function to draw procedural KBC Logo Badge on corners
    function drawKBCLogo(ctx, x, y) {
        ctx.save();
        // Outer Gold Ring
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, 45, 0, Math.PI * 2);
        ctx.stroke();
        
        // Inner Blue Fill Disc
        ctx.fillStyle = "#0f2d59";
        ctx.beginPath();
        ctx.arc(x, y, 42, 0, Math.PI * 2);
        ctx.fill();
        
        // Inner Gold Border Line
        ctx.strokeStyle = "rgba(212, 175, 55, 0.6)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, 36, 0, Math.PI * 2);
        ctx.stroke();

        // KBC Text Bold Alignment
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 24px 'Arial Black', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("KBC", x, y);
        
        // Tiny decorative rupee sign under text
        ctx.fillStyle = "#d4af37";
        ctx.font = "bold 12px Arial";
        ctx.fillText("₹", x, y + 20);
        ctx.restore();
    }

    function generateCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');
        
        // 4K High Definition Canvas Grid Base Dimensions
        canvas.width = 1200;
        canvas.height = 700;
        
        // 1. Draw Royal Navy Blue Theme Background
        ctx.fillStyle = "#0c2340";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 2. Premium Dual Layer Gold Borders Layout
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 6;
        ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
        ctx.lineWidth = 2;
        ctx.strokeRect(25, 25, canvas.width - 50, canvas.height - 50);
        
        // 3. Draw Procedural KBC Corner Badges
        drawKBCLogo(ctx, 95, 95);   // Top Left Corner
        drawKBCLogo(ctx, 1105, 95); // Top Right Corner
        
        // 4. Header Typography Rendering Configuration
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 52px 'Times New Roman', serif";
        ctx.textAlign = "center";
        ctx.fillText("KBC MEGA LOTTERY", canvas.width / 2, 90);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 24px Arial, sans-serif";
        ctx.fillText("OFFICIAL WINNER CLEARANCE PASS", canvas.width / 2, 135);
        
        ctx.fillStyle = "#d4af37";
        ctx.font = "italic bold 18px Arial, sans-serif";
        ctx.fillText("CERTIFICATE OF JACKPOT CLEARANCE & REGISTRATION", canvas.width / 2, 170);
        
        // Reset Text Anchor Baseline alignment for data fields block
        ctx.textAlign = "left";
        
        // Field Labels Alignment Layout Matrix
        const labels = [
            "Winner Full Name:",
            "Registration Number:",
            "Winner Phone Number:",
            "Bank Account Number:",
            "Prize Won:",
            "Required Ledger Processing Charges:"
        ];
        
        let startY = 240;
        let lineSpacing = 55;
        
        labels.forEach((label, index) => {
            ctx.fillStyle = "#d4af37"; // Gold text color for labels
            ctx.font = "bold 20px Arial, sans-serif";
            ctx.fillText(label, 320, startY + (index * lineSpacing));
            
            // Layout clean horizontal baseline strokes for form values
            ctx.strokeStyle = "rgba(255,255,255,0.25)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(320, startY + (index * lineSpacing) + 12);
            ctx.lineTo(820, startY + (index * lineSpacing) + 12);
            ctx.stroke();
        });
        
        // 5. Populate Dynamic Live Form Fields Input Stream Values
        ctx.fillStyle = "#ffffff"; // Bright crisp white text for entries data
        ctx.font = "bold 21px Arial, sans-serif";
        
        const name = document.getElementById('winnerName').value || "---";
        const regNo = document.getElementById('regNo').value || "---";
        const phone = document.getElementById('phoneNo').value || "---";
        const account = document.getElementById('accountNo').value || "---";
        const charges = document.getElementById('charges').value || "0.00";
        const appLink = document.getElementById('appLink').value;
        
        // Mapped to sit flawlessly on top of each respective data line grid field boundary
        ctx.fillText(name, 510, 240);
        ctx.fillText(regNo, 535, 295);
        ctx.fillText(phone, 550, 350);
        ctx.fillText(account, 545, 405);
        ctx.fillText("₹25,00,000/- (Rupees Twenty-Five Lakhs Only)", 440, 460);
        ctx.fillText("Rs. " + charges + "/-", 700, 515);

        // 6. Draw Account Details Panel Container (Right Sidebar Grid Segment)
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 3;
        ctx.strokeRect(860, 220, 300, 150);
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fillRect(860, 220, 300, 150);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 18px Arial, sans-serif";
        ctx.fillText("Account Details for Transfer", 880, 250);
        ctx.fillStyle = "#ffffff";
        ctx.font = "16px Arial, sans-serif";
        ctx.fillText("Bank: State Bank of India", 880, 285);
        ctx.fillText("Status: Process Cleared", 880, 315);
        ctx.fillText("Code: KBC-786", 880, 345);

        // 7. Draw Processing Charges Breakdown Panel Container Block
        ctx.strokeRect(860, 395, 300, 145);
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fillRect(860, 395, 300, 145);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 18px Arial, sans-serif";
        ctx.fillText("Processing Charges Breakdown", 875, 425);
        ctx.fillStyle = "#ffffff";
        ctx.font = "16px Arial, sans-serif";
        ctx.fillText("Rupees For Won: Rs. " + charges + "/-", 875, 465);
        ctx.fillText("Ledger Processing: Rs. " + charges + "/-", 875, 500);

        // 8. Footer Authority Signatures Drawing Area
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath();
        ctx.moveTo(350, 620); ctx.lineTo(550, 620);
        ctx.moveTo(850, 620); ctx.lineTo(1050, 620);
        ctx.stroke();
        
        // Procedural Authority Signatures - Calligraphic Emulation Styling
        ctx.save();
        ctx.strokeStyle = "#00bfff"; // Digital Blue Security Ink
        ctx.lineWidth = 3;
        ctx.font = "italic bold 24px 'Brush Script MT', cursive, sans-serif";
        
        // Government Officer Signature
        ctx.beginPath();
        ctx.moveTo(370, 605); ctx.lineTo(410, 595); ctx.lineTo(450, 610); ctx.lineTo(520, 590);
        ctx.stroke();
        ctx.fillStyle = "#00bfff";
        ctx.fillText("Govt Clearance", 380, 595);
        
        // Authorized KBC Signature Script
        ctx.beginPath();
        ctx.moveTo(870, 600); ctx.bezierCurveTo(890, 580, 930, 620, 960, 590); ctx.lineTo(1020, 605);
        ctx.stroke();
        ctx.fillText("KBC Corporate", 880, 590);
        ctx.restore();
        
        // Metadata text subtitles labels under lines
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.font = "14px Arial, sans-serif";
        ctx.fillText("Government Clearance Officer", 360, 645);
        ctx.fillText("Authorized KBC Signature", 870, 645);
        ctx.fillText("KBC CORPORATE OFFICE, MUMBAI", 845, 665);

        // 9. Passport Photo Display Frame Rendering Configuration
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(50, 220, 220, 260); // Base canvas placeholder white block
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 3;
        ctx.strokeRect(50, 220, 220, 260);
        
        const photoInput = document.getElementById('clientPhoto');
        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const clientImg = new Image();
                clientImg.onload = function() {
                    ctx.drawImage(clientImg, 55, 225, 210, 250);
                    drawQRCode(ctx, appLink, canvas);
                }
                clientImg.src = event.target.result;
            }
            reader.readAsDataURL(photoInput.files[0]);
        } else {
            ctx.fillStyle = "#0c2340";
            ctx.font = "bold 14px Arial, sans-serif";
            ctx.fillText("CUSTOMER PIC", 95, 340);
            drawQRCode(ctx, appLink, canvas);
        }
    }
    
    function drawQRCode(ctx, text, canvas) {
        if(text) {
            const qrObj = new QRious({
                value: text,
                size: 110,
                level: 'H'
            });
            
            const qrImg = new Image();
            qrImg.onload = function() {
                ctx.drawImage(qrImg, 70, 540, 110, 110);
                finalizeOutput(canvas);
            };
            qrImg.src = qrObj.toDataURL();
        } else {
            finalizeOutput(canvas);
        }
    }
    
    function finalizeOutput(canvas) {
        canvas.style.display = "block";
        document.getElementById('dlBtn').style.display = "block";
        canvas.scrollIntoView({ behavior: 'smooth' });
    }
    
    function downloadCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        const nameInput = document.getElementById('winnerName').value || "Winner";
        link.download = `KBC_Clearance_Pass_${nameInput.replace(/\s+/g, '_')}.png`;
        link.href = image;
        link.click();
    }
</script>

</body>
</html>
