<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pass Generator - Final Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        h2 {
            color: #0b3c5d;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0b3c5d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #328cc1;
        }
        #canvasContainer {
            text-align: center;
            max-width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 2px solid #0b3c5d;
            border-radius: 8px;
            display: none;
        }
        .action-buttons {
            display: none;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
        }
        .download-btn {
            background-color: #27ae60;
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KBC Parchi Generator</h2>
    
    <div class="form-group">
        <label>Winner Full Name:</label>
        <input type="text" id="winnerName" placeholder="Enter Full Name">
    </div>
    
    <div class="form-group">
        <label>Registration Number:</label>
        <input type="text" id="regNo" placeholder="Enter Registration Number">
    </div>
    
    <div class="form-group">
        <label>Winner Phone Number:</label>
        <input type="text" id="phoneNo" placeholder="Enter Phone Number">
    </div>
    
    <div class="form-group">
        <label>Bank Account Number:</label>
        <input type="text" id="accountNo" placeholder="Enter Bank Account Number">
    </div>
    
    <div class="form-group">
        <label>Required Ledger Processing Charges:</label>
        <input type="text" id="charges" placeholder="e.g. 12,200">
    </div>

    <div class="form-group">
        <label>App Link (For QR Code):</label>
        <input type="text" id="appLink" value="https://kbc-lottery.vercel.app/">
    </div>

    <div class="form-group">
        <label>Client Passport Photo:</label>
        <input type="file" id="clientPhoto" accept="image/*">
    </div>
    
    <button onclick="generateCertificate()">Generate Parchi</button>
</div>

<div id="canvasContainer">
    <canvas id="certificateCanvas"></canvas>
</div>

<div class="action-buttons" id="actionArea">
    <button class="download-btn" onclick="downloadCertificate()">Download Parchi</button>
</div>

<script>
    function generateCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');
        
        const baseImg = new Image();
        baseImg.src = 'certificate_template.png';
        
        baseImg.onload = function() {
            canvas.width = baseImg.naturalWidth;
            canvas.height = baseImg.naturalHeight;
            
            // Background drawing
            ctx.drawImage(baseImg, 0, 0);
            
            // Text typography adjustments - Bold Dark Navy Blue for lines
            ctx.fillStyle = "#1e293b"; 
            ctx.font = "bold 24px Arial, sans-serif";
            
            const name = document.getElementById('winnerName').value;
            const regNo = document.getElementById('regNo').value;
            const phone = document.getElementById('phoneNo').value;
            const account = document.getElementById('accountNo').value;
            const charges = document.getElementById('charges').value;
            const appLink = document.getElementById('appLink').value;
            
            // Mapped to fit exactly into the white spaces across template lines
            ctx.fillText(name, 560, 412);
            ctx.fillText(regNo, 560, 458);
            ctx.fillText(phone, 560, 508);
            ctx.fillText(account, 560, 555);
            
            if(charges) {
                // Bottom charges position shift
                ctx.font = "bold 26px Arial, sans-serif";
                ctx.fillText("Rs. " + charges + "/-", 610, 650);
                
                // Processing charges breakdown block on the right panel
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 20px Arial, sans-serif";
                ctx.fillText("Rs. " + charges + "/-", 915, 665);
                ctx.fillText("Rs. " + charges + "/-", 915, 693);
            }
            
            // Client image positioning box adjustments
            const photoInput = document.getElementById('clientPhoto');
            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const clientImg = new Image();
                    clientImg.onload = function() {
                        // Positioned strictly within the borders of the custom photo holder
                        ctx.drawImage(clientImg, 82, 410, 168, 205);
                        drawQRCode(ctx, appLink, canvas);
                    }
                    clientImg.src = event.target.result;
                }
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                drawQRCode(ctx, appLink, canvas);
            }
        };
    }
    
    function drawQRCode(ctx, text, canvas) {
        if(text) {
            const qrObj = new QRious({
                value: text,
                size: 110,
                level: 'M'
            });
            
            const qrImg = new Image();
            qrImg.onload = function() {
                // Shifted away from base image QR code container bounds to avoid clipping issues
                ctx.drawImage(qrImg, 580, 715, 110, 110);
                finalizeOutput(canvas);
            };
            qrImg.src = qrObj.toDataURL();
        } else {
            finalizeOutput(canvas);
        }
    }
    
    function finalizeOutput(canvas) {
        canvas.style.display = "block";
        document.getElementById('actionArea').style.display = "flex";
        canvas.scrollIntoView({ behavior: 'smooth' });
    }
    
    function downloadCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        const nameInput = document.getElementById('winnerName').value || "Winner";
        link.download = `KBC_Registration_${nameInput.replace(/\s+/g, '_')}.png`;
        link.href = image;
        link.click();
    }
</script>

</body>
</html>
