<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pass Generator - Official Certificate Edition</title>
    <!-- Qrious Library for QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }
        h2 {
            color: #0c2340;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0c2340;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #canvasContainer {
            text-align: center;
            max-width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 3px solid #b8860b;
            border-radius: 8px;
            display: none;
        }
        .download-btn {
            background-color: #27ae60;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            display: none;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KBC Certificate Generator</h2>
    
    <div class="form-group">
        <label>Winner Full Name:</label>
        <input type="text" id="winnerName" placeholder="Enter Full Name" value="Imran khan">
    </div>
    
    <div class="form-group">
        <label>Registration Number:</label>
        <input type="text" id="regNo" placeholder="Enter Registration Number" value="Kbc-3698">
    </div>
    
    <div class="form-group">
        <label>Winner Phone Number:</label>
        <input type="text" id="phoneNo" placeholder="Enter Phone Number" value="7867876787">
    </div>
    
    <div class="form-group">
        <label>Bank Account Number:</label>
        <input type="text" id="accountNo" placeholder="Enter Bank Account Number" value="4674764555656545">
    </div>
    
    <div class="form-group">
        <label>Required Ledger Processing Charges:</label>
        <input type="text" id="charges" placeholder="e.g. 12,200" value="12,200">
    </div>

    <div class="form-group">
        <label>Client Passport Photo:</label>
        <input type="file" id="clientPhoto" accept="image/*">
    </div>
    
    <button onclick="generateCertificate()">Generate Certificate</button>
</div>

<div id="canvasContainer">
    <canvas id="certificateCanvas"></canvas>
    <button class="download-btn" id="dlBtn" onclick="downloadCertificate()">Download Certificate</button>
</div>

<script>
    const modiImg = new Image();
    const bachanImg = new Image();
    const kbcLogoImg = new Image();
    const flagImg = new Image();
    const stampImg = new Image();
    const sign1Img = new Image();
    const sign2Img = new Image();
    
    modiImg.src = "images/modi.png"; 
    bachanImg.src = "images/bachan.png";
    kbcLogoImg.src = "images/kbc_logo.png";
    flagImg.src = "images/flag.png";
    stampImg.src = "images/stamp.png";
    sign1Img.src = "images/sign1.png";
    sign2Img.src = "images/sign2.png";

    function drawSBILogo(ctx, x, y) {
        ctx.save();
        ctx.fillStyle = "#00a4e4";
        ctx.beginPath();
        ctx.arc(x, y, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#031124"; 
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#031124";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x, y + 4);
        ctx.lineTo(x, y + 17);
        ctx.stroke();
        ctx.restore();
    }

    function generateCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1200;
        canvas.height = 700;
        
        let bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bgGrad.addColorStop(0, '#030f20');
        bgGrad.addColorStop(0.5, '#071b35');
        bgGrad.addColorStop(1, '#041328');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // WATERMARK SETTING (KBC Logo in center with balanced transparency)
        try {
            ctx.save();
            ctx.globalAlpha = 0.38; 
            ctx.drawImage(kbcLogoImg, (canvas.width / 2) - 160, (canvas.height / 2) - 130, 320, 320);
            ctx.restore();
        } catch (e) { console.log("Watermark error"); }
        
        // Borders
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 6;
        ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "#f3e5ab";
        ctx.strokeRect(24, 24, canvas.width - 48, canvas.height - 48);
        
        // Logos & Top Images
        try {
            ctx.drawImage(kbcLogoImg, 170, 40, 110, 110);
            ctx.drawImage(kbcLogoImg, 920, 40, 110, 110);
        } catch (e) { console.log("Logo error"); }
        
        try {
            ctx.drawImage(modiImg, 45, 40, 110, 110);
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 2;
            ctx.strokeRect(45, 40, 110, 110);
        } catch (e) { console.log("Modi photo pending..."); }

        try {
            ctx.drawImage(bachanImg, 1045, 40, 110, 110);
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 2;
            ctx.strokeRect(1045, 40, 110, 110);
        } catch (e) { console.log("Bachchan photo pending..."); }

        // Typography Header
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 52px 'Times New Roman', serif";
        ctx.textAlign = "center";
        ctx.fillText("KBC MEGA LOTTERY", canvas.width / 2, 85);
        
        try {
            ctx.drawImage(flagImg, (canvas.width / 2) - 30, 105, 60, 60);
        } catch (e) { console.log("Flag image loading error"); }
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 23px Arial, sans-serif";
        ctx.fillText("OFFICIAL WINNER CLEARANCE PASS", canvas.width / 2, 195);
        
        ctx.fillStyle = "#d4af37";
        ctx.font = "italic bold 16px Arial, sans-serif";
        ctx.fillText("CERTIFICATE OF JACKPOT CLEARANCE & REGISTRATION", canvas.width / 2, 225);
        
        try {
            ctx.drawImage(stampImg, 730, 115, 85, 85);
        } catch (e) { console.log("Stamp image error"); }
        
        ctx.textAlign = "left";
        
        const labels = [
            "Winner Full Name:",
            "Registration Number:",
            "Winner Phone Number:",
            "Bank Account Number:",
            "Prize Won:",
            "Required Ledger Processing Charges:"
        ];
        
        let startY = 285;
        let lineSpacing = 55;
        
        labels.forEach((label, index) => {
            ctx.fillStyle = "#d4af37";
            ctx.font = "bold 19px Arial, sans-serif";
            ctx.fillText(label, 320, startY + (index * lineSpacing));
            
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(320, startY + (index * lineSpacing) + 12);
            ctx.lineTo(830, startY + (index * lineSpacing) + 12);
            ctx.stroke();
        });
        
        ctx.fillStyle = "#ffffff"; 
        ctx.font = "bold 20px Arial, sans-serif";
        
        const name = document.getElementById('winnerName').value || "---";
        const regNo = document.getElementById('regNo').value || "---";
        const phone = document.getElementById('phoneNo').value || "---";
        const account = document.getElementById('accountNo').value || "---";
        const charges = document.getElementById('charges').value || "0.00";
        const winningAmount = "₹25,00,000";
        
        ctx.fillText(name, 510, 285);
        ctx.fillText(regNo, 530, 340);
        ctx.fillText(phone, 545, 395);
        ctx.fillText(account, 540, 450);
        ctx.fillText(`${winningAmount}/- (Rupees Twenty-Five Lakhs Only)`, 440, 505);
        ctx.fillText("Rs. " + charges + "/-", 700, 560);

        // Sidebar Widgets
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 2.5;
        ctx.strokeRect(860, 265, 305, 145);
        ctx.fillStyle = "rgba(3, 15, 32, 0.85)";
        ctx.fillRect(860, 265, 305, 145);
        
        drawSBILogo(ctx, 895, 295);
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 17px Arial, sans-serif";
        ctx.fillText("State Bank of India", 922, 300);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "15px Arial, sans-serif";
        ctx.fillText("Transfer Path: Official Secure Wire", 880, 332);
        ctx.fillText("Status: Verification Cleared", 880, 357);
        ctx.fillText("Code Auth: KBC-786-SBI", 880, 383);

        ctx.strokeRect(860, 430, 305, 140);
        ctx.fillStyle = "rgba(3, 15, 32, 0.85)";
        ctx.fillRect(860, 430, 305, 140);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 17px Arial, sans-serif";
        ctx.fillText("Processing Charges Breakdown", 878, 458);
        ctx.fillStyle = "#ffffff";
        ctx.font = "15px Arial, sans-serif";
        ctx.fillText("Govt Ledger Fee: Rs. " + charges + "/-", 878, 495);
        ctx.fillText("Clearance Tax Cost: Rs. " + charges + "/-", 878, 530);

        // Main Bottom Signatures (Transparent & White)
        try {
            ctx.save();
            ctx.filter = "invert(1) brightness(3)";
            ctx.drawImage(sign1Img, 320, 565, 170, 75); 
            ctx.drawImage(sign2Img, 840, 565, 170, 75); 
            ctx.restore();
        } catch (e) { console.log("Signatures image loading error"); }
        
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = "13px Arial, sans-serif";
        ctx.fillText("Government Clearance Officer Signature", 320, 665);
        ctx.fillText("Authorized KBC Authority Signature", 840, 665);

        // Client Image Box Setup
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(50, 265, 220, 260); 
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 3;
        ctx.strokeRect(50, 265, 220, 260);
        
        const photoInput = document.getElementById('clientPhoto');
        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const clientImg = new Image();
                clientImg.onload = function() {
                    // 1. Draw User Uploaded Image
                    ctx.drawImage(clientImg, 55, 270, 210, 250);
                    
                    // 2. Punch Verification Signature onto Client Photo
                    ctx.save();
                    ctx.filter = "invert(1) brightness(3)"; // Converted to white overlay
                    ctx.globalAlpha = 0.85; // Natural overlay stamp opacity
                    ctx.drawImage(sign2Img, 80, 430, 160, 65);
                    ctx.restore();
                    
                    // 3. Render QR Code
                    drawQRCode(ctx, name, regNo, phone, account, winningAmount, canvas);
                }
                clientImg.src = event.target.result;
            }
            reader.readAsDataURL(photoInput.files[0]);
        } else {
            ctx.fillStyle = "#0c2340";
            ctx.font = "bold 14px Arial, sans-serif";
            ctx.fillText("CUSTOMER PIC PLACEHOLDER", 62, 390);
            drawQRCode(ctx, name, regNo, phone, account, winningAmount, canvas);
        }
    }
    
    function drawQRCode(ctx, name, regNo, phone, account, winningAmount, canvas) {
        // Updated text formatting to include KBC Registration Number
        const qrStringData = `Winner Name: ${name}\nRegistration No: ${regNo}\nPhone No: ${phone}\nAccount No: ${account}\nWinning Amount: ${winningAmount}`;
        
        const qrObj = new QRious({
            value: qrStringData,
            size: 110,
            level: 'H' // High correction allows logo overlapping without breaking the scan
        });
        
        const qrImg = new Image();
        qrImg.onload = function() {
            // Draw generated QR code
            ctx.drawImage(qrImg, 70, 550, 110, 110);
            
            // Draw branding KBC center logo precisely on top of the QR code
            try {
                ctx.drawImage(kbcLogoImg, 110, 590, 30, 30);
            } catch (e) { console.log("QR inner logo error"); }
            
            finalizeOutput(canvas);
        };
        qrImg.src = qrObj.toDataURL();
    }
    
    function finalizeOutput(canvas) {
        canvas.style.display = "block";
        document.getElementById('dlBtn').style.display = "block";
        canvas.scrollIntoView({ behavior: 'smooth' });
    }
    
    function downloadCertificate() {
        const canvas = document.getElementById('certificateCanvas');
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        const nameInput = document.getElementById('winnerName').value || "Winner";
        link.download = `KBC_Official_Certificate_${nameInput.replace(/\s+/g, '_')}.png`;
        link.href = image;
        link.click();
    }
</script>

</body>
</html>
