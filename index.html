<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Official Lottery Winner</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0d1b2a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1b263b; padding: 30px; border-radius: 15px; border: 3px solid #e0a96d; box-shadow: 0px 0px 20px #e0a96d; }
        h1 { color: #e0a96d; margin-bottom: 5px; }
        .prize { font-size: 24px; color: #4eed50; font-weight: bold; margin: 20px 0; }
        .details { font-size: 18px; margin: 15px 0; background: #415a77; padding: 10px; border-radius: 8px; }
        .footer { font-size: 12px; color: #888; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/b5/Kaun_Banega_Crorepatititlecard.jpg" alt="KBC Logo" style="width:150px; border-radius:50%;">
        <h1>Kaun Banega Crorepati</h1>
        <p>Official Congratulation Portal</p>
        <hr style="border-color: #e0a96d;">
        
        <div class="prize">🎉 Congratulations! You Won ₹25,00,000 Cash Prize! 🎉</div>
        
        <div class="details">
            <strong>Winner Name:</strong> <span id="victimName">Loading...</span>
        </div>
        <div class="details">
            <strong>Registered No:</strong> <span id="victimNumber">Loading...</span>
        </div>

        <p style="color: #ff4d4d; font-size: 14px; font-weight: bold;">To claim your lottery amount, contact KBC Head Office immediately.</p>
        <div class="footer">© 2026 KBC Lottery Management System India/Pakistan. All rights reserved.</div>
    </div>

    <script>
        // URL se victim ka naam aur number read karne ka script
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || "Respected User";
        const num = urlParams.get('num') || "Your Mobile Number";

        document.getElementById('victimName').innerText = decodeURIComponent(name);
        document.getElementById('victimNumber').innerText = decodeURIComponent(num);
    </script>
</body>
</html>
